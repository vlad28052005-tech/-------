<!doctype html>
<html lang="uk">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Розклад — 4 курс, група В</title>
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json" />
    <style>
         :root {
            --bg: #0b1220;
            --panel: #0e1726;
            --text: #e5eefb;
            --muted: #a9b8d5;
            --accent: #0ea5e9;
            --card: #0f172a;
            --border: #1f2a44;
            --lec: #3b82f6;
            --prac: #facc15;
            --green: #16a34a;
            --anim-ms: 360ms;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --panel: #fff;
            --text: #0b1220;
            --muted: #54627a;
            --card: #ffffff;
            --border: #e2e8f0;
        }
        /* 🪄 Секретна тема Слизерину */
        
        [data-theme="slytherin"] {
            --bg: #0a1410;
            --panel: #0f1f17;
            --text: #c0d8ce;
            --muted: #648a75;
            --card: #0d1a13;
            --border: #183324;
            --lec: #10b981;
            --prac: #a3b8b0;
            --accent: #2ea064;
            --green: #10b981;
        }
        
        [data-theme="slytherin"] .timer-chip {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        .wrap {
            max-width: 1250px;
            margin: 0 auto;
            padding: 12px env(safe-area-inset-right, 12px) env(safe-area-inset-bottom, 30px) env(safe-area-inset-left, 12px);
        }
        
        .topbar {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: max(12px, env(safe-area-inset-top, 12px)) 0 12px 0;
            z-index: 40;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        
        @supports (backdrop-filter: blur(12px)) {
            .topbar {
                background: rgba(var(--bg), 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
            }
        }
        /* Робимо заголовок клікабельним для пасхалки */
        
        .brand {
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
        }
        
        .muted {
            color: var(--muted);
            font-size: 13px;
        }
        
        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            background: var(--panel);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .btn {
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: transform .14s ease, box-shadow .18s ease;
        }
        
        .btn:active {
            transform: translateY(1px) scale(.98);
        }
        
        @media (hover: hover) {
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
            }
        }
        
        .grid-wrap {
            overflow: hidden;
        }
        
        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            align-items: start;
            transition: transform var(--anim-ms) ease, opacity var(--anim-ms) ease;
        }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(8px);
            animation: cardIn .4s forwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .04);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        
        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .day {
            font-weight: 800;
            font-size: 17px;
        }
        
        .dateSmall {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }
        
        .pair {
            border-radius: 12px;
            padding: 12px;
            margin: 0 0 12px 0;
            background: var(--panel);
            border: 1px solid var(--border);
            transition: transform .12s, border .18s, background 0.4s ease;
        }
        
        .pair:last-child {
            margin-bottom: 0;
        }
        
        .pair h4 {
            margin: 8px 0;
            font-size: 14.5px;
            line-height: 1.35;
        }
        
        .pair .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .chip {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .lec {
            background: rgba(59, 130, 246, 0.15);
            color: var(--lec);
        }
        
        .prac {
            background: rgba(250, 204, 21, 0.15);
            color: #d97706;
        }
        
        [data-theme="dark"] .prac {
            color: var(--prac);
        }
        
        .timer-chip {
            background: rgba(14, 165, 233, 0.15);
            color: var(--accent);
            border: 1px solid rgba(14, 165, 233, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }
        
        .card.now {
            border: 2px solid var(--accent);
        }
        
        .pair.current {
            border: 2px solid var(--accent);
            background: rgba(14, 165, 233, 0.05);
        }
        
        .pair.next {
            border: 2px solid #f59e0b;
        }
        
        .pair.upcoming {
            border: 2px solid var(--green);
        }
        /* 🔗 Стилі для модального вікна QR-коду */
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--panel);
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 320px;
            width: 90%;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-content img {
            width: 100%;
            border-radius: 12px;
            margin: 16px 0;
            background: white;
            padding: 12px;
        }
        
        .close-btn {
            background: var(--bg);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 15px;
        }
        
        @media (max-width: 680px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .topbar>div:first-child {
                text-align: center;
            }
            .topbar>div:last-child {
                justify-content: space-between;
                flex-wrap: wrap;
            }
            .controls {
                flex: 1;
                justify-content: space-between;
                min-width: 100%;
            }
            .btn {
                flex: 1;
                text-align: center;
                padding: 10px;
            }
            #toggleTheme {
                flex: 0.2;
            }
            #qrBtn {
                flex: 0.2;
            }
        }
    </style>
</head>

<body data-theme="dark">
    <div class="wrap">
        <div class="topbar" role="banner">
            <div>
                <div class="brand" id="secretTitle" title="Спробуй тапнути 5 разів...">Розклад — 4 курс, група В</div>
                <div class="muted">Юридичний факультет</div>
            </div>

            <div style="display:flex;gap:8px;align-items:center">
                <button id="toggleTheme" class="btn" title="Тема">🌓</button>
                <button id="qrBtn" class="btn" title="Поділитися QR-кодом">🔗 QR</button>
                <button id="todayBtn" class="btn" title="Сьогодні">Сьогодні</button>

                <div class="controls" role="navigation" aria-label="Тиждень">
                    <button id="prevWeek" class="btn" aria-label="Попередній тиждень">◀</button>
                    <div style="min-width:110px;text-align:center"><strong id="weekLabel">Нижній</strong>
                        <div id="weekRange" class="muted" style="font-size:12px; margin-top:2px;"></div>
                    </div>
                    <button id="nextWeek" class="btn" aria-label="Наступний тиждень">▶</button>
                </div>
            </div>
        </div>

        <div class="grid-wrap">
            <div id="weekGrid" class="grid cards" aria-live="polite"></div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <h3 style="margin:0 0 8px 0;">Поділитися розкладом</h3>
            <div class="muted">Нехай відсканують цей код</div>
            <img id="qrImage" src="" alt="QR Code">
            <button class="close-btn" id="closeQr">Закрити</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
